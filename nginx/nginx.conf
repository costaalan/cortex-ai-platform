events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting ──────────────────────────────────
    limit_req_zone $binary_remote_addr zone=cortex_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;

    # ── Upstreams ─────────────────────────────────────
    upstream cortex_api {
        server cortex-api:8701;
    }

    upstream admin_panel {
        server admin-panel:8702;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    # ── Main Server ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Global CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Frontend SPA ───────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Cortex API ─────────────────────────────────
        location /api/ {
            limit_req zone=cortex_limit burst=5 nodelay;
            proxy_pass http://cortex_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Admin Panel ────────────────────────────────
        location /admin/ {
            limit_req zone=cortex_limit burst=5 nodelay;
            proxy_pass http://admin_panel/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Grafana ────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Prometheus ─────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # ── Health Check ───────────────────────────────
        location /health {
            proxy_pass http://cortex_api/health;
            access_log off;
        }
    }
}
